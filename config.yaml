matcher_type: minima
device: cuda

preprocessing:
  save_processed: false

matcher_weights:
  gim_model_type: lightglue
  gim_weights_path: matchers/gim/weights/gim_lightglue_100h.ckpt

  lightglue_features: superpoint

  loftr_weights_path: matchers/LoFTR/weights/outdoor_ds.ckpt

  minima_method: sp_lg
  minima_weights_dir: matchers/MINIMA/weights
  minima_xoftr_ckpt: minima_xoftr.ckpt
  minima_loftr_ckpt: minima_loftr.ckpt
  minima_sp_lg_ckpt: minima_lightglue.pth

matcher_params:
  gim:
    dkm_h: 672
    dkm_w: 896
    gim_lightglue_max_keypoints: 2048
    gim_lightglue_filter_threshold: 0.1
    resize_max: 768
    dfactor: 8
  lightglue:
    extractor_max_keypoints: 2048
  loftr:
    match_thr: 0.2
    temp_bug_fix: true
    resize: [1024]
  minima:
    match_threshold: 0.3
    fine_threshold: 0.1
    loftr_threshold: 0.2

ransac_params:
  confidence: 0.999
  max_iter: 10000
  method: RANSAC
  reproj_threshold: 5.0

positioning_params:
  min_inliers_for_success: 50
  save_visualization: false
  save_frame_sequence: false
  sample_interval: 1
  map_context:
    enabled: true
    coverage_factor: 2.0
    max_grid: 3              # max NxN tile grid (3=768px, optimal for matcher)
    save_context_maps: false # keep stitched context maps after inference
  pair_logging:
    enabled: true             # frame visualization
    save_failed: false
    save_matched: false
    max_unique_pairs: 1
  adaptive_search:
    strategy: ins_simulation   # ins_simulation | adaptive_radius
    initial_radius_m: 500.0
    max_radius_m: 1000.0
    skip_penalty_m: 100.0
    ins_noise_sigma_m: 30.0   # per-step INS drift std dev (metres)
    ins_noise_max_m: 150.0    # per-step INS drift hard cap (metres)

tile_provider:
  name: esri
  cache_dir: satellite
