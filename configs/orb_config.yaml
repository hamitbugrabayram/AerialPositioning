matcher_type: orb
device: cuda

preprocessing:
  save_processed: false

matcher_weights: {}

matcher_params:
  orb:
    max_features: 4000
    scale_factor: 1.2
    nlevels: 8
    edge_threshold: 31
    patch_size: 31
    resize_max: 1600
    ratio_test: 0.8
    max_matches: 1500
    fast_threshold: 12
    min_descriptor_matches: 12
    use_clahe: true

ransac_params:
  confidence: 0.999
  max_iter: 10000
  method: RANSAC
  reproj_threshold: 5.0

positioning_params:
  min_inliers_for_success: 50
  save_visualization: false
  save_frame_sequence: false
  sample_interval: 1
  map_context:
    enabled: true
    coverage_factor: 2.0
    max_grid: 3              # max NxN tile grid (3=768px, optimal for matcher)
    save_context_maps: false # keep stitched context maps after inference
  pair_logging:
    enabled: true             # frame visualization
    save_failed: false
    save_matched: false
    max_unique_pairs: 1
  adaptive_search:
    strategy: synthetic_ins_drift   # synthetic_ins_drift | adaptive_radius
    initial_radius_m: 500.0
    max_radius_m: 1000.0
    skip_penalty_m: 100.0
    synthetic_ins_noise_sigma_m: 30.0   # synthetic INS drift scale parameter (metres)
    synthetic_ins_noise_max_m: 150.0    # synthetic INS drift hard cap (metres)

tile_provider:
  name: esri
  cache_dir: satellite
